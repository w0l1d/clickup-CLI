name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      access:
        description: npm package access level
        required: false
        default: restricted
        type: choice
        options:
          - restricted
          - public

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access ${{ github.event.inputs.access || 'restricted' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}