name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      access:
        description: npm package access level
        required: false
        default: restricted
        type: choice
        options:
          - restricted
          - public

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # CRITICAL: Required for Trusted Publishing
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false  # never use caching in release builds

      - name: Install dependencies
        run: npm ci

      - name: Verify version consistency
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          echo "Tag:    v$TAG_VERSION"
          echo "Package: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Git tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Versions match."

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance
